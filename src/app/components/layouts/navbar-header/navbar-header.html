<!-- Desktop Navbar (>= 992px) -->
<nav class="navbar navbar-expand-lg fixed-top NavbarGlass d-none d-lg-flex">
  <div class="container">
    <a class="navbar-brand Brand" routerLink="/">IVO<span class="TextAccent">VICENCIO</span></a>
    <div class="d-flex align-items-center gap-2 order-lg-3">
      <button class="LangToggle" (click)="ts.toggleLang()" [attr.aria-label]="'Switch language'">
        <span class="LangOption" [class.Active]="ts.currentLang() === 'es'">ES</span>
        <span class="LangDivider">/</span>
        <span class="LangOption" [class.Active]="ts.currentLang() === 'en'">EN</span>
      </button>
      <button
        class="navbar-toggler ToggleBtn"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMain"
        aria-controls="navbarMain"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="ToggleIcon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarMain">
      <div class="navbar-nav ms-auto d-flex align-items-center gap-lg-4 NavWrapper">
        <a
          class="nav-link NavCustom"
          routerLink="/"
          routerLinkActive="ActiveLink"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ 'nav.home' | translate }}</a
        >
        <a class="nav-link NavCustom" routerLink="/projects" routerLinkActive="ActiveLink">{{
          'nav.projects' | translate
        }}</a>
        <a class="BtnNeon NavContactBtn" routerLink="/contact-me">{{
          'nav.contact' | translate
        }}</a>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile Navbar (< 992px) -->
<nav class="MobileNav d-lg-none">
  <div class="MobileNavBar">
    <button class="MobileMenuBtn" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'">
      <span class="MenuBtnIcon">
        <span class="MenuBtnLine"></span>
        <span class="MenuBtnLine"></span>
        <span class="MenuBtnLine"></span>
      </span>
    </button>

    <a class="MobileBrand" routerLink="/">
      <span class="BrandLight">IVO</span><span class="TextAccent">VICENCIO</span>
    </a>

    <button class="MobileLangBtn" (click)="ts.toggleLang()" [attr.aria-label]="'Switch language'">
      <span [class.Active]="ts.currentLang() === 'es'">ES</span>
      <span class="LangSlash">/</span>
      <span [class.Active]="ts.currentLang() === 'en'">EN</span>
    </button>
  </div>

  <!-- Full-screen overlay menu -->
  <div class="MobileMenuOverlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()">
    <div class="MobileMenuContent" (click)="$event.stopPropagation()">
      <button class="MobileCloseBtn" (click)="closeMobileMenu()">
        <span class="CloseLine"></span>
        <span class="CloseLine"></span>
      </button>
      <div class="MenuOverlayGlow"></div>
      <div class="MenuSysHeader">NAVIGATION</div>
      <div class="MobileMenuLinks">
        <a class="MobileMenuLink" routerLink="/" (click)="closeMobileMenu()" routerLinkActive="MobileLinkActive"
          [routerLinkActiveOptions]="{ exact: true }">{{ 'nav.home' | translate }}</a>
        <a class="MobileMenuLink" routerLink="/projects" (click)="closeMobileMenu()" routerLinkActive="MobileLinkActive">{{ 'nav.projects' | translate }}</a>
        <a class="MobileMenuLink MobileContactLink" routerLink="/contact-me" (click)="closeMobileMenu()" routerLinkActive="MobileLinkActive">{{ 'nav.contact' | translate }}</a>
      </div>
      <div class="MobileMenuFooter">
        <span class="MenuFooterLang" (click)="ts.toggleLang()">
          <span [class.Active]="ts.currentLang() === 'es'">[ES]</span>
          <span class="LangDivider">|</span>
          <span [class.Active]="ts.currentLang() === 'en'">[EN]</span>
        </span>
      </div>
    </div>
  </div>
</nav>
